apiVersion: v1
kind: Namespace
metadata:
  name: pod-crash-controller
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-crash-controller
  namespace: pod-crash-controller
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/pod-crash-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-crash-controller
rules:
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-crash-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pod-crash-controller
subjects:
  - kind: ServiceAccount
    name: pod-crash-controller
    namespace: pod-crash-controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-crash-controller
  namespace: pod-crash-controller
  labels:
    app.kubernetes.io/name: pod-crash-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pod-crash-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pod-crash-controller
    spec:
      serviceAccountName: pod-crash-controller
      containers:
        - name: controller
          image: your-registry/pod-crash-controller:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SNS_TOPIC_ARN
              value: arn:aws:sns:us-east-1:123456789012:pod-crash-alerts
            - name: AWS_REGION
              value: us-east-1
            - name: WATCH_NAMESPACE
              value: ""
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
